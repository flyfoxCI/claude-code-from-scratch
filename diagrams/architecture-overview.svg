<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="#1e293b">Claude Code 架构概览</text>

  <!-- Core Layer -->
  <rect x="250" y="80" width="400" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#b45309">Query Engine (query.ts)</text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui" font-size="14" fill="#92400e">核心循环 + AsyncGenerator 流式处理</text>

  <!-- Left Column: Input -->
  <rect x="50" y="120" width="150" height="60" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="125" y="150" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0369a1">User Input</text>
  <text x="125" y="170" text-anchor="middle" font-family="system-ui" font-size="11" fill="#075985">CLI / REPL</text>

  <!-- Right Column: Output -->
  <rect x="700" y="120" width="150" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="775" y="150" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#15803d">Output</text>
  <text x="775" y="170" text-anchor="middle" font-family="system-ui" font-size="11" fill="#166534">Stream / Terminal</text>

  <!-- Arrows to/from Core -->
  <line x1="200" y1="150" x2="250" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="130" x2="700" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Tool System Box -->
  <rect x="100" y="250" width="280" height="180" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="285" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#334155">工具系统</text>

  <!-- Tool items -->
  <rect x="120" y="305" width="100" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="170" y="328" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">BashTool</text>

  <rect x="240" y="305" width="120" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="300" y="328" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">Read/Write/Edit</text>

  <rect x="120" y="355" width="100" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="170" y="378" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">AgentTool</text>

  <rect x="240" y="355" width="120" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="300" y="378" text-anchor="middle" font-family="system-ui" font-size="12" fill="#166534">GrepTool</text>

  <!-- MCP Box -->
  <rect x="520" y="250" width="280" height="180" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="660" y="285" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#334155">扩展系统</text>

  <rect x="540" y="305" width="240" height="35" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="660" y="328" text-anchor="middle" font-family="system-ui" font-size="12" fill="#0369a1">MCP (Model Context Protocol)</text>

  <rect x="540" y="355" width="240" height="35" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="660" y="378" text-anchor="middle" font-family="system-ui" font-size="12" fill="#7e22ce">Skills System</text>

  <!-- Context Management Box -->
  <rect x="250" y="480" width="400" height="100" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#334155">上下文管理</text>
  <rect x="280" y="530" width="130" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="345" y="550" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b45309">Token Budget</text>
  <rect x="430" y="530" width="130" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="495" y="550" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b45309">Auto-Compact</text>
  <rect x="580" y="530" width="130" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="645" y="550" text-anchor="middle" font-family="system-ui" font-size="11" fill="#b45309">Memory/CLAUDE.md</text>

  <!-- State Management -->
  <rect x="250" y="620" width="400" height="60" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="450" y="650" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#be185d">状态管理: AppStateStore + TaskStore</text>

  <!-- Connection lines -->
  <line x1="340" y1="180" x2="240" y2="250" stroke="#64748b" stroke-width="2"/>
  <line x1="560" y1="180" x2="660" y2="250" stroke="#64748b" stroke-width="2"/>
  <line x1="340" y1="430" x2="340" y2="480" stroke="#64748b" stroke-width="2"/>
  <line x1="560" y1="430" x2="560" y2="480" stroke="#64748b" stroke-width="2"/>
  <line x1="450" y1="580" x2="450" y2="620" stroke="#64748b" stroke-width="2"/>

  <!-- Arrow markers definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>