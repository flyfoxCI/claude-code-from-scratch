<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="#1e293b">状态管理模式</text>

  <!-- AppStateStore -->
  <rect x="50" y="80" width="380" height="180" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="240" y="115" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#b45309">AppStateStore</text>
  <text x="240" y="140" text-anchor="middle" font-family="system-ui" font-size="12" fill="#92400e">全局应用状态</text>

  <rect x="80" y="160" width="320" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="240" y="180" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">currentTask | messages | tools | session</text>

  <rect x="80" y="200" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="155" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0369a1">getState()</text>

  <rect x="250" y="200" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="325" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0369a1">setState()</text>

  <!-- TaskStore -->
  <rect x="470" y="80" width="380" height="180" rx="12" fill="#f3e8ff" stroke="#a855f7" stroke-width="3"/>
  <text x="660" y="115" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#7e22ce">TaskStore</text>
  <text x="660" y="140" text-anchor="middle" font-family="system-ui" font-size="12" fill="#a855f7">任务级状态</text>

  <rect x="500" y="160" width="320" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="660" y="180" text-anchor="middle" font-family="system-ui" font-size="11" fill="#475569">taskId | checkpoints | results | subtasks</text>

  <rect x="500" y="200" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="575" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0369a1">queryCheckpoint</text>

  <rect x="670" y="200" width="150" height="40" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="745" y="223" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0369a1">resumeFrom()</text>

  <!-- Store Pattern -->
  <rect x="250" y="300" width="400" height="100" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#475569">响应式 Store 模式</text>

  <rect x="280" y="355" width="140" height="30" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="350" y="375" text-anchor="middle" font-family="system-ui" font-size="11" fill="#166534">subscribe(listener)</text>

  <rect x="440" y="355" width="140" height="30" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="510" y="375" text-anchor="middle" font-family="system-ui" font-size="11" fill="#166534">notify() on change</text>

  <rect x="600" y="355" width="140" height="30" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="670" y="375" text-anchor="middle" font-family="system-ui" font-size="11" fill="#166534">selector pattern</text>

  <!-- State Snapshot -->
  <rect x="150" y="430" width="600" height="55" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#be185d">
    状态序列化: SerializableState → JSON → Resume/Checkpoint
  </text>
  <text x="450" y="478" text-anchor="middle" font-family="system-ui" font-size="11" fill="#9d174d">
    ch19: 详细分析 AppStateStore、TaskStore、状态持久化机制
  </text>
</svg>